version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: miniposman-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniposman}
      POSTGRES_USER: ${POSTGRES_USER:-miniposman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miniposman} -d ${POSTGRES_DB:-miniposman}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - miniposman-network
    restart: unless-stopped

  # ===========================================
  # Django Backend
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miniposman-backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      POSTGRES_DB: ${POSTGRES_DB:-miniposman}
      POSTGRES_USER: ${POSTGRES_USER:-miniposman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miniposman-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/send/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Next.js Frontend
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miniposman-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NODE_ENV: production
    networks:
      - miniposman-network
    restart: unless-stopped

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: miniposman-nginx
    ports:
      - "80:80"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - static_volume:/var/www/static:ro
    depends_on:
      - backend
      - frontend
    networks:
      - miniposman-network
    restart: unless-stopped
    command: >
      /bin/sh -c "envsubst '$$NGINX_SERVER_NAME' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  miniposman-network:
    driver: bridge
